name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Test
        run: uv run --frozen pytest

      - name: Compile and load custom op
        run: |
          uv run --frozen python - <<'PY'
          import tempfile

          import onnxruntime

          from fast_silero_vad.custom_op.build_vad_custom_op import build_vad_custom_op

          with tempfile.TemporaryDirectory() as output_dir:
              library_path = build_vad_custom_op(output_dir)
              options = onnxruntime.SessionOptions()
              options.register_custom_ops_library(library_path)
          PY

      - name: Verify exports against Silero VAD >=6.2
        run: |
          uv run --frozen --extra dev --extra export python -m pytest \
            --download-silero-vad \
            tests/test_export_equivalence.py

      - name: Build distributions
        run: uv build
